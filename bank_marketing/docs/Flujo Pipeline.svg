<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="100%" height="100%" style="background:#0f1117;font-family:'Segoe UI','Inter',sans-serif;">
  <defs>
    <!-- Gradientes -->
    <linearGradient id="gradStart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradImpute" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradScale" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradEncode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradFeature" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b1e2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradOutput" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>

    <!-- Sombras -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Marcadores de flecha -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <!-- Título -->
  <text x="300" y="45" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700" letter-spacing="1">Pipeline de Preprocesamiento</text>
  <text x="300" y="68" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="400">Flujo de transformación de datos</text>

  <!-- Línea central guía -->
  <line x1="300" y1="100" x2="300" y2="770" stroke="#334155" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.3"/>

  <!-- Paso 1: Train -->
  <g transform="translate(150, 90)">
    <rect x="0" y="0" width="300" height="65" rx="12" fill="url(#gradStart)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="150" y="28" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700" letter-spacing="2">PASO 1</text>
    <text x="150" y="50" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="600">📊 Train / Test Split</text>
  </g>

  <!-- Flecha 1 -->
  <line x1="300" y1="155" x2="300" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 2: Imputación -->
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="300" height="65" rx="12" fill="url(#gradImpute)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="150" y="28" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700" letter-spacing="2">PASO 2</text>
    <text x="150" y="50" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="600">🧹 Imputación de nulos</text>
  </g>

  <!-- Flecha 2 -->
  <line x1="300" y1="265" x2="300" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 3: Escalamiento -->
  <g transform="translate(150, 310)">
    <rect x="0" y="0" width="300" height="65" rx="12" fill="url(#gradScale)" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="150" y="28" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700" letter-spacing="2">PASO 3</text>
    <text x="150" y="50" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="600">⚖️ Escalamiento (StandardScaler)</text>
  </g>

  <!-- Flecha 3 -->
  <line x1="300" y1="375" x2="300" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 4: Codificación -->
  <g transform="translate(150, 420)">
    <rect x="0" y="0" width="300" height="65" rx="12" fill="url(#gradEncode)" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="150" y="28" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700" letter-spacing="2">PASO 4</text>
    <text x="150" y="50" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="600">🔣 Codificación (One-Hot)</text>
  </g>

  <!-- Flecha 4 -->
  <line x1="300" y1="485" x2="300" y2="520" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 5: Ingeniería de Características -->
  <g transform="translate(150, 530)">
    <rect x="0" y="0" width="300" height="65" rx="12" fill="url(#gradFeature)" stroke="#b91c1c" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="150" y="28" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700" letter-spacing="2">PASO 5</text>
    <text x="150" y="50" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="600">⚙️ Ingeniería de características</text>
  </g>

  <!-- Flecha 5 -->
  <line x1="300" y1="595" x2="300" y2="630" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 6: Dataset Procesado -->
  <g transform="translate(150, 640)">
    <rect x="0" y="0" width="300" height="70" rx="12" fill="url(#gradOutput)" stroke="#0d9488" stroke-width="2" filter="url(#glow)"/>
    <text x="150" y="28" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700" letter-spacing="2">OUTPUT</text>
    <text x="150" y="52" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="600">✅ Dataset Procesado</text>
  </g>

  <!-- Flecha final decorativa -->
  <line x1="300" y1="710" x2="300" y2="740" stroke="#0d9488" stroke-width="2" opacity="0.5"/>

  <!-- Badge final -->
  <text x="300" y="770" text-anchor="middle" fill="#64748b" font-size="11" font-weight="400">Pipeline listo para entrenamiento</text>

  <!-- Columna lateral de herramientas (derecha) -->
  <g transform="translate(510, 90)">
    <text x="0" y="0" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">HERRAMIENTAS</text>
    <line x1="0" y1="8" x2="120" y2="8" stroke="#334155" stroke-width="1"/>

    <rect x="0" y="18" width="120" height="42" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <text x="60" y="38" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">train_test_split</text>
    <text x="60" y="52" text-anchor="middle" fill="#94a3b8" font-size="9">sklearn.model_selection</text>

    <rect x="0" y="68" width="120" height="42" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <text x="60" y="88" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">SimpleImputer</text>
    <text x="60" y="102" text-anchor="middle" fill="#94a3b8" font-size="9">sklearn.impute</text>

    <rect x="0" y="118" width="120" height="42" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <text x="60" y="138" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">StandardScaler</text>
    <text x="60" y="152" text-anchor="middle" fill="#94a3b8" font-size="9">sklearn.preprocessing</text>

    <rect x="0" y="168" width="120" height="42" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <text x="60" y="188" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">OneHotEncoder</text>
    <text x="60" y="202" text-anchor="middle" fill="#94a3b8" font-size="9">sklearn.preprocessing</text>

    <rect x="0" y="218" width="120" height="42" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
    <text x="60" y="238" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">ColumnTransformer</text>
    <text x="60" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">sklearn.compose</text>
  </g>

  <!-- Leyenda (esquina inferior izquierda) -->
  <g transform="translate(30, 730)">
    <text x="0" y="0" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">LEYENDA</text>
    <line x1="0" y1="6" x2="100" y2="6" stroke="#334155" stroke-width="0.8"/>

    <circle cx="6" cy="18" r="4" fill="#1e3a5f"/>
    <text x="16" y="22" fill="#94a3b8" font-size="9">Imputación</text>

    <circle cx="6" cy="30" r="4" fill="#b45309"/>
    <text x="16" y="34" fill="#94a3b8" font-size="9">Escalamiento</text>

    <circle cx="6" cy="42" r="4" fill="#7c3aed"/>
    <text x="16" y="46" fill="#94a3b8" font-size="9">Codificación</text>

    <circle cx="6" cy="54" r="4" fill="#7b1e2b"/>
    <text x="16" y="58" fill="#94a3b8" font-size="9">Ingeniería</text>
  </g>
</svg>