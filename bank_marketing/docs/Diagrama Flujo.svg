<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="100%" height="100%" style="background:#0f1117;font-family:'Segoe UI','Inter',sans-serif;">
  <defs>
    <!-- Gradientes y sombras -->
    <linearGradient id="gradStart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradClean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradSplit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradEDA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradPreproc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradFeat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b1e2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradPipeline" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradOutput" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <!-- Título -->
  <text x="450" y="50" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700" letter-spacing="1.5">Flujo de Trabajo — Ciencia de Datos</text>
  <text x="450" y="78" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="400">Pipeline de procesamiento y modelado</text>

  <!-- Línea central vertical -->
  <line x1="450" y1="120" x2="450" y2="1120" stroke="#334155" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Paso 1: Dataset original -->
  <g transform="translate(225, 100)">
    <rect x="0" y="0" width="450" height="70" rx="12" fill="url(#gradStart)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="30" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700" letter-spacing="2">PASO 1</text>
    <text x="225" y="52" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="600">📦 Dataset original</text>
  </g>

  <!-- Flecha 1 -->
  <line x1="450" y1="170" x2="450" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 2: Limpieza mínima segura -->
  <g transform="translate(225, 220)">
    <rect x="0" y="0" width="450" height="70" rx="12" fill="url(#gradClean)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="30" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700" letter-spacing="2">PASO 2</text>
    <text x="225" y="52" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="600">🧹 Limpieza mínima segura</text>
  </g>

  <!-- Flecha 2 -->
  <line x1="450" y1="290" x2="450" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 3: Separación X e y -->
  <g transform="translate(225, 340)">
    <rect x="0" y="0" width="450" height="70" rx="12" fill="url(#gradSplit)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="30" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="2">PASO 3</text>
    <text x="225" y="52" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="600">✂️ Separación X (features) e y (target)</text>
  </g>

  <!-- Flecha 3 -->
  <line x1="450" y1="410" x2="450" y2="450" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 4: Train/Test Split -->
  <g transform="translate(225, 460)">
    <rect x="0" y="0" width="450" height="70" rx="12" fill="url(#gradSplit)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="30" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="2">PASO 4</text>
    <text x="225" y="52" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="600">🔄 Train/Test Split (80/20)</text>
  </g>

  <!-- Flecha 4 -->
  <line x1="450" y1="530" x2="450" y2="570" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 5: EDA sobre Train -->
  <g transform="translate(225, 580)">
    <rect x="0" y="0" width="450" height="70" rx="12" fill="url(#gradEDA)" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="30" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700" letter-spacing="2">PASO 5</text>
    <text x="225" y="52" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="600">📊 EDA sobre Train (Análisis Exploratorio)</text>
  </g>

  <!-- Flecha 5 -->
  <line x1="450" y1="650" x2="450" y2="690" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 6: Preprocesamiento -->
  <g transform="translate(225, 700)">
    <rect x="0" y="0" width="450" height="70" rx="12" fill="url(#gradPreproc)" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="30" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700" letter-spacing="2">PASO 6</text>
    <text x="225" y="52" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="600">⚙️ Preprocesamiento (escalado, imputación)</text>
  </g>

  <!-- Flecha 6 -->
  <line x1="450" y1="770" x2="450" y2="810" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 7: Ingeniería de características -->
  <g transform="translate(225, 820)">
    <rect x="0" y="0" width="450" height="70" rx="12" fill="url(#gradFeat)" stroke="#b91c1c" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="30" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700" letter-spacing="2">PASO 7</text>
    <text x="225" y="52" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="600">🔧 Ingeniería de características</text>
  </g>

  <!-- Flecha 7 -->
  <line x1="450" y1="890" x2="450" y2="930" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Paso 8: Pipeline final -->
  <g transform="translate(225, 940)">
    <rect x="0" y="0" width="450" height="70" rx="12" fill="url(#gradPipeline)" stroke="#0d9488" stroke-width="2" filter="url(#glow)"/>
    <text x="225" y="30" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700" letter-spacing="2">PASO 8</text>
    <text x="225" y="52" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="600">🚀 Pipeline final (entrenamiento + evaluación)</text>
  </g>

  <!-- Flecha 8 -->
  <line x1="450" y1="1010" x2="450" y2="1050" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Output Final -->
  <g transform="translate(225, 1060)">
    <rect x="0" y="0" width="450" height="60" rx="12" fill="url(#gradOutput)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="225" y="35" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700" letter-spacing="1">✅ Modelo entrenado + métricas de evaluación</text>
  </g>

  <!-- Badge de confirmación al final -->
  <text x="450" y="1160" text-anchor="middle" fill="#64748b" font-size="12" font-weight="400">Pipeline completo — listo para producción</text>

  <!-- Columna lateral de dependencias (derecha) -->
  <g transform="translate(720, 100)">
    <text x="0" y="0" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="1">DEPENDENCIAS</text>
    <line x1="0" y1="8" x2="140" y2="8" stroke="#334155" stroke-width="1"/>

    <rect x="0" y="20" width="140" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70" y="40" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">📂 dataset.csv</text>
    <text x="70" y="58" text-anchor="middle" fill="#94a3b8" font-size="10">archivo de entrada</text>

    <rect x="0" y="95" width="140" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70" y="115" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">🧪 sklearn</text>
    <text x="70" y="133" text-anchor="middle" fill="#94a3b8" font-size="10">train_test_split</text>

    <rect x="0" y="170" width="140" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70" y="190" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">📊 pandas + matplotlib</text>
    <text x="70" y="208" text-anchor="middle" fill="#94a3b8" font-size="10">análisis exploratorio</text>

    <rect x="0" y="245" width="140" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70" y="265" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">⚙️ Pipeline</text>
    <text x="70" y="283" text-anchor="middle" fill="#94a3b8" font-size="10">ColumnTransformer</text>

    <rect x="0" y="320" width="140" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70" y="340" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">📈 Modelo ML</text>
    <text x="70" y="358" text-anchor="middle" fill="#94a3b8" font-size="10">RandomForest / XGBoost</text>
  </g>

  <!-- Leyenda (esquina inferior izquierda) -->
  <g transform="translate(40, 1050)">
    <text x="0" y="0" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">LEYENDA</text>
    <line x1="0" y1="8" x2="120" y2="8" stroke="#334155" stroke-width="1"/>

    <rect x="0" y="18" width="12" height="12" rx="3" fill="#1e293b"/>
    <text x="20" y="28" fill="#94a3b8" font-size="10">Preparación</text>

    <rect x="0" y="38" width="12" height="12" rx="3" fill="#7c3aed"/>
    <text x="20" y="48" fill="#94a3b8" font-size="10">Análisis (EDA)</text>

    <rect x="0" y="58" width="12" height="12" rx="3" fill="#d97706"/>
    <text x="20" y="68" fill="#94a3b8" font-size="10">Transformación</text>

    <rect x="0" y="78" width="12" height="12" rx="3" fill="#0d9488"/>
    <text x="20" y="88" fill="#94a3b8" font-size="10">Pipeline final</text>
  </g>
</svg>